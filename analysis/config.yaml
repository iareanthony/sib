# SIB Alert Analysis Configuration
analysis:
  enabled: true
  obfuscation_level: standard
  
  # LLM Provider: ollama, openai, anthropic (env: LLM_PROVIDER)
  provider: ${LLM_PROVIDER:-anthropic}
  
  # Ollama (local) - for privacy
  ollama:
    url: ${OLLAMA_URL:-http://localhost:11434}
    model: ${OLLAMA_MODEL:-qwen2.5:14b}
  
  # Anthropic Claude - requires API key
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    model: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
  
  # OpenAI - requires API key
  openai:
    api_key: ${OPENAI_API_KEY}
    model: ${OPENAI_MODEL:-gpt-4o}

# AIB (Assets in a Box) integration - optional
# When configured, Falco alerts are enriched with asset metadata, blast radius,
# and audit findings from the AIB graph before LLM analysis.
aib:
  url: ${AIB_BASE_URL:-}
  api_token: ${AIB_API_TOKEN:-}
  cache_ttl: 300  # seconds

# Storage backend: loki or vm (auto-detected from STACK env var)
storage:
  backend: ${STACK:-loki}

loki:
  # Use sib-loki for Docker, localhost for local development
  url: ${LOKI_URL:-http://sib-loki:3100}

victorialogs:
  url: ${VICTORIALOGS_URL:-http://sib-victorialogs:9428}
